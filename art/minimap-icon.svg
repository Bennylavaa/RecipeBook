<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b860"/>
      <stop offset="100%" stop-color="#9a7e38"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e2e40"/>
      <stop offset="100%" stop-color="#1e1e2c"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M32,5 L56,17 L56,36 Q56,51 32,60 Q8,51 8,36 L8,17 Z" fill="url(#shield)" stroke="#c0a050" stroke-width="1"/>
  <path d="M32,9 L52,20 L52,35 Q52,48 32,56 Q12,48 12,35 L12,20 Z" fill="url(#inner)"/>

  <!-- Open book outline -->
  <g transform="translate(32, 30)" stroke="#c0a050" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-1,-10 Q-12,-9 -15,-6 L-15,8 Q-12,6 -1,7 Z"/>
    <!-- Right page -->
    <path d="M1,-10 Q12,-9 15,-6 L15,8 Q12,6 1,7 Z"/>
    <!-- Spine -->
    <line x1="0" y1="-11" x2="0" y2="8"/>
    <!-- Page lines left -->
    <line x1="-12" y1="-3" x2="-4" y2="-4" opacity="0.5"/>
    <line x1="-12" y1="1" x2="-4" y2="0" opacity="0.4"/>
    <!-- Page lines right -->
    <line x1="4" y1="-4" x2="12" y2="-3" opacity="0.5"/>
    <line x1="4" y1="0" x2="12" y2="1" opacity="0.4"/>
  </g>
</svg>
